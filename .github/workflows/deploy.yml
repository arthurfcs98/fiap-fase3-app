name: Deploy

on:
  push:
    branches: [main, homolog]

env:
  AWS_REGION: us-east-1
  ECR_REPO: fiap-fase3-app
  CLUSTER_NAME: fiap-fase3-eks

jobs:
  deploy:
    name: Build + Push ECR + Deploy EKS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        run: |
          aws configure set aws_access_key_id     "${{ secrets.AWS_ACCESS_KEY_ID }}"     --profile default
          aws configure set aws_secret_access_key "${{ secrets.AWS_SECRET_ACCESS_KEY }}" --profile default
          aws configure set aws_session_token     "${{ secrets.AWS_SESSION_TOKEN }}"    --profile default
          aws configure set region                "${{ env.AWS_REGION }}"               --profile default

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region "${{ env.AWS_REGION }}" \
            | docker login --username AWS --password-stdin "${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"

      - name: Build + Push image
        run: |
          IMG="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:${{ github.sha }}"
          docker build -t "$IMG" -t "${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:latest" .
          docker push "$IMG"
          docker push "${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:latest"

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name "${{ env.CLUSTER_NAME }}" --region "${{ env.AWS_REGION }}"

      - name: Resolve secret ARNs from infra-db state
        id: secret_arns
        run: |
          STATE_URI="s3://fiap-fase3-tfstate-${{ secrets.AWS_ACCOUNT_ID }}/infra-db/terraform.tfstate"
          DB_ARN=$(aws s3 cp "$STATE_URI" - | jq -r '.outputs.db_secret_arn.value')
          JWT_ARN=$(aws s3 cp "$STATE_URI" - | jq -r '.outputs.jwt_secret_arn.value')
          [ "$DB_ARN" = "null" ] && { echo "::error::DB secret ARN not found"; exit 1; }
          [ "$JWT_ARN" = "null" ] && { echo "::error::JWT secret ARN not found"; exit 1; }
          echo "db_arn=$DB_ARN" >> $GITHUB_OUTPUT
          echo "jwt_arn=$JWT_ARN" >> $GITHUB_OUTPUT

      - name: Resolve OTLP endpoint from infra-k8s state
        id: otlp
        run: |
          STATE_URI="s3://fiap-fase3-tfstate-${{ secrets.AWS_ACCOUNT_ID }}/infra-k8s/terraform.tfstate"
          OTLP=$(aws s3 cp "$STATE_URI" - | jq -r '.outputs.otlp_http_endpoint.value // ""')
          if [ -z "$OTLP" ] || [ "$OTLP" = "null" ]; then
            echo "::warning::OTLP endpoint not found in infra-k8s state — observability VM not deployed yet"
            OTLP=""
          fi
          echo "endpoint=$OTLP" >> $GITHUB_OUTPUT
          echo "OTLP endpoint: $OTLP"

      - name: Sync Secrets Manager values into K8s Secret
        run: |
          # LabEksNodeRole não tem permissão para Secrets Manager, então em vez
          # de buscar em runtime, lemos no CI (que tem credenciais STS) e
          # gravamos como Secret K8s. Pods consomem via envFrom.
          kubectl create namespace oficina --dry-run=client -o yaml | kubectl apply -f -

          DB_JSON=$(aws secretsmanager get-secret-value --secret-id "${{ steps.secret_arns.outputs.db_arn }}" --query SecretString --output text)
          JWT_VAL=$(aws secretsmanager get-secret-value --secret-id "${{ steps.secret_arns.outputs.jwt_arn }}" --query SecretString --output text)

          DB_HOST=$(echo "$DB_JSON" | jq -r .host)
          DB_PORT=$(echo "$DB_JSON" | jq -r .port)
          DB_USERNAME=$(echo "$DB_JSON" | jq -r .username)
          DB_PASSWORD=$(echo "$DB_JSON" | jq -r .password)
          DB_DATABASE=$(echo "$DB_JSON" | jq -r .dbname)

          kubectl create secret generic api-secret -n oficina \
            --from-literal=DB_HOST="$DB_HOST" \
            --from-literal=DB_PORT="$DB_PORT" \
            --from-literal=DB_USERNAME="$DB_USERNAME" \
            --from-literal=DB_PASSWORD="$DB_PASSWORD" \
            --from-literal=DB_DATABASE="$DB_DATABASE" \
            --from-literal=JWT_SECRET="$JWT_VAL" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Render and apply K8s manifests
        run: |
          IMG="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:${{ github.sha }}"
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-8)

          for f in k8s/*.yaml; do
            sed -e "s|__IMAGE__|$IMG|g" \
                -e "s|__SHA__|$SHA_SHORT|g" \
                -e "s|__FRONTEND_URL__|https://placeholder.example.com|g" \
                -e "s|__OTLP_ENDPOINT__|${{ steps.otlp.outputs.endpoint }}|g" \
                "$f" > "$f.rendered"
          done

          kubectl apply -f k8s/namespace.yaml.rendered
          kubectl apply -f k8s/configmap.yaml.rendered

          # Migration job: deleta anterior se existir, aplica novo, espera completar
          kubectl delete job api-migrations -n oficina --ignore-not-found=true
          kubectl apply -f k8s/migration-job.yaml.rendered
          kubectl wait --for=condition=complete --timeout=180s job/api-migrations -n oficina || {
            echo "::error::Migration job failed; logs:"
            kubectl logs -n oficina job/api-migrations --tail=200
            exit 1
          }

          kubectl apply -f k8s/service.yaml.rendered
          kubectl apply -f k8s/deployment.yaml.rendered
          kubectl apply -f k8s/hpa.yaml.rendered
          kubectl apply -f k8s/ingress.yaml.rendered

          kubectl rollout status deployment/api -n oficina --timeout=300s
          echo
          echo "=== Pods ==="
          kubectl get pods -n oficina
          echo
          echo "=== Service / Ingress ==="
          kubectl get svc,ingress -n oficina
